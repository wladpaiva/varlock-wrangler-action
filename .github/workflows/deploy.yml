name: Varlock Wrangler Action Self Testing

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install modules
        run: npm ci

      - name: Unit Tests
        run: npm run test -- --run

      - name: Check Formatting
        run: npm run check

      - name: Build action
        run: npm run build
